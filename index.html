html<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --ink: #0a0a0a; --paper: #f0ebe0; --red: #d62828; }
  body { background: var(--ink); color: var(--paper); font-family: 'Space Mono', monospace; min-height: 100svh; display: flex; flex-direction: column; align-items: center; }
  header { width: 100%; padding: 18px 24px 14px; display: flex; align-items: baseline; gap: 12px; border-bottom: 2px solid #2a2a2a; background: var(--ink); position: sticky; top: 0; z-index: 10; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.08em; color: var(--paper); line-height: 1; }
  .logo .struck { position: relative; display: inline-block; color: var(--red); }
  .logo .struck::after { content: ''; position: absolute; left: -2px; right: -2px; top: 50%; height: 3px; background: var(--red); transform: rotate(-8deg); }
  .tagline { font-size: 0.6rem; letter-spacing: 0.15em; color: #666; text-transform: uppercase; }
  main { width: 100%; max-width: 680px; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
  .camera-wrap { position: relative; width: 100%; aspect-ratio: 4/3; border-radius: 4px; overflow: hidden; background: #111; border: 1px solid #2a2a2a; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .controls { display: flex; gap: 10px; }
  button { font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px 20px; border: 1px solid #333; border-radius: 2px; cursor: pointer; background: #181818; color: var(--paper); }
  button.primary { background: var(--red); border-color: var(--red); color: white; flex: 1; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .result-panel { background: #111; border: 1px solid #2a2a2a; border-radius: 4px; overflow: hidden; }
  .result-label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: #555; padding: 10px 14px 6px; border-bottom: 1px solid #1e1e1e; }
  .result-body { padding: 14px; min-height: 60px; font-size: 0.85rem; line-height: 1.7; color: var(--paper); }
  .highlight { background: rgba(214,40,40,0.15); color: var(--red); padding: 1px 4px; border-radius: 2px; font-weight: 700; }
  .status-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-top: 1px solid #1e1e1e; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: #555; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #333; flex-shrink: 0; }
  .dot.active { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
  .dot.scanning { background: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .snap-flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; transition: opacity 0.05s; }
  .snap-flash.flash { opacity: 0.7; }
  .instructions { font-size: 0.65rem; color: #444; line-height: 1.8; }
  .removed-count { display: flex; align-items: baseline; gap: 8px; padding: 10px 14px; border-top: 1px solid #1e1e1e; font-size: 0.65rem; text-transform: uppercase; color: #555; }
  .count-badge { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--red); }
  canvas#capture-canvas { display: none; }
</style>

<header>
  <div class="logo">LETTER <span class="struck">T</span> FILTER</div>
  <div class="tagline">Surgical letter removal technology</div>
</header>
<main>
  <div class="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="snap-flash" id="snap-flash"></div>
  </div>
  <canvas id="capture-canvas"></canvas>
  <div class="controls">
    <button class="primary" id="start-btn">Start Camera</button>
    <button id="snap-btn" disabled>Scan Text</button>
  </div>
  <p class="instructions">Point at any text. Hit Scan Text — the capital T gets surgically removed from the target word.</p>
  <div class="result-panel">
    <div class="result-label">Detected & Processed Text</div>
    <div class="result-body" id="result-body">Awaiting scan...</div>
    <div class="removed-count" id="removed-count" style="display:none">
      <span class="count-badge" id="t-count">0</span> capital T's removed this session
    </div>
    <div class="status-row">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Camera off</span>
    </div>
  </div>
</main>

<script>
const video = document.getElementById('video');
const captureCanvas = document.getElementById('capture-canvas');
const snapBtn = document.getElementById('snap-btn');
const startBtn = document.getElementById('start-btn');
const resultBody = document.getElementById('result-body');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const snapFlash = document.getElementById('snap-flash');
const removedCountEl = document.getElementById('removed-count');
const tCountEl = document.getElementById('t-count');
let totalRemoved = 0, isProcessing = false;
const targetWord = ['T','r','u','m','p'].join('');
const processedWord = targetWord.slice(1);

startBtn.addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
    video.srcObject = stream;
    await video.play();
    setStatus('active', 'Camera live — aim at text');
    startBtn.textContent = 'Restart Camera';
    snapBtn.disabled = false;
  } catch(e) {
    setStatus('', 'Camera permission denied');
    resultBody.innerHTML = '<span style="color:#d62828">Camera blocked. Tap the camera icon in the address bar and allow access, then refresh.</span>';
  }
});

snapBtn.addEventListener('click', async () => {
  if (isProcessing) return;
  isProcessing = true; snapBtn.disabled = true;
  snapFlash.classList.add('flash');
  setTimeout(() => snapFlash.classList.remove('flash'), 150);
  setStatus('scanning', 'Scanning...');
  captureCanvas.width = video.videoWidth;
  captureCanvas.height = video.videoHeight;
  captureCanvas.getContext('2d').drawImage(video, 0, 0);
  const imageData = captureCanvas.toDataURL('image/jpeg', 0.85).split(',')[1];
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageData } },
          { type: 'text', text: `OCR this image. Return ONLY valid JSON: "raw" (exact text), "processed" (replace every "${targetWord}" with "${processedWord}"), "found" (boolean), "count" (number of replacements). No markdown.` }
        ]}]
      })
    });
    const data = await response.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '{}';
    let parsed;
    try { parsed = JSON.parse(text); } catch { parsed = { raw: 'Parse error', processed: '', found: false, count: 0 }; }
    displayResult(parsed);
  } catch(err) {
    resultBody.innerHTML = '<span style="color:#555">Connection error. Try again.</span>';
    setStatus('active', 'Error');
  }
  isProcessing = false; snapBtn.disabled = false;
});

function displayResult({ raw, processed, found, count }) {
  if (!raw?.trim()) { resultBody.innerHTML = '<span style="color:#555">No text detected.</span>'; setStatus('active', 'No text found'); return; }
  if (found) {
    totalRemoved += (count || 1);
    tCountEl.textContent = totalRemoved;
    removedCountEl.style.display = 'flex';
    const highlighted = escHtml(processed).replace(new RegExp(processedWord, 'g'), `<span class="highlight">${processedWord}</span>`);
    resultBody.innerHTML = `<div style="color:#555;font-size:0.65rem;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.1em">Original</div><div style="color:#888;margin-bottom:12px">${escHtml(raw)}</div><div style="color:#555;font-size:0.65rem;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.1em">Processed</div><div>${highlighted}</div>`;
    setStatus('active', `Removed ${count} instance${count !== 1 ? 's' : ''}`);
  } else {
    resultBody.innerHTML = `<div style="color:#555;font-size:0.65rem;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.1em">Text found — target not present</div><div style="color:#888">${escHtml(raw)}</div>`;
    setStatus('active', 'Target not found');
  }
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setStatus(type, msg) { statusText.textContent = msg; statusDot.className = 'dot'; if (type === 'active') statusDot.classList.add('active'); if (type === 'scanning') statusDot.classList.add('scanning'); }
</script>
